name: Terraform-Security-Policy-Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      action:
        description: 'apply or destroy'
        required: true
        default: 'plan'
      environment:
        description: "Select environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  terraform-security:
    name: Terraform Plan + Conftest Policy Check
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/dev
        shell: bash
    env:
      TF_VERSION: "1.6.6"
      #CONFTEST_VERSION: "0.45.0"
      OPA_VERSION: "1.15.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::495680546469:role/github-action-role
          aws-region: us-east-1
          audience: sts.amazonaws.com
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup OPA
        # Use the official action to install OPA CLI
        uses: [open-policy-agent/setup-opa@v2](https://github.com/open-policy-agent/setup-opa)
        with:
          version: latest # Specify the OPA version, 'latest' or a specific SemVer range

      - name: Run OPA Tests
        # Run opa test command on your policy files
        run: opa test policies/*.rego -v

      - name: Terraform Format
        run: ./environments/dev/terraform fmt -check

      - name: Security Scan
        run: |
          pip install checkov
          checkov -d .

      - name: Terraform Init
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan&apply'
        run: |
         chmod +x ./scripts/deploy.sh
         ./scripts/deploy.sh dev


      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false
